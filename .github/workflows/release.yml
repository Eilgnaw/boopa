name: Release

# Builds Boopa, signs it with a Developer ID certificate, notarizes & staples it
# with Apple, publishes a GitHub Release with the zipped .app, and bumps the
# Homebrew cask so `brew install --cask` stays current.
#
# Trigger: push a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0
# (or run manually via "Run workflow" and pass the tag).
#
# ──────────────────────────────────────────────────────────────────────────
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   MACOS_CERTIFICATE_P12_BASE64  Developer ID Application cert + key, exported
#                                 from Keychain as .p12, then `base64 -i cert.p12`.
#   MACOS_CERTIFICATE_PASSWORD    Password you set when exporting the .p12.
#   KEYCHAIN_PASSWORD             Any string; password for the temp CI keychain.
#
#   AC_API_KEY_ID                 App Store Connect API key ID (e.g. ABC123XYZ).
#   AC_API_ISSUER_ID              App Store Connect issuer ID (UUID).
#   AC_API_KEY_P8_BASE64          The AuthKey_XXXX.p8, `base64 -i AuthKey.p8`.
#
# Optional:
#   MACOS_SIGN_IDENTITY           Exact identity name if you have several certs,
#                                 e.g. "Developer ID Application: Name (TEAMID)".
#                                 Defaults to "Developer ID Application".
#
# Create the App Store Connect API key at:
#   https://appstoreconnect.apple.com/access/integrations/api  (role: Developer)
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write # create the release + commit the cask bump

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up mise (installs Tuist from .mise.toml)
        uses: jdx/mise-action@v2

      - name: Generate Xcode project
        run: |
          mise x -- tuist install
          mise x -- tuist generate --no-open

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -workspace Boopa.xcworkspace \
            -scheme Boopa \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "APP=$PWD/build/Build/Products/Release/Boopa.app" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Codesign (hardened runtime, secure timestamp)
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          IDENTITY="${SIGN_IDENTITY:-Developer ID Application}"
          # Sign nested code first (no-op for our statically linked build), then the app.
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -type f -perm +111 -print0 | while IFS= read -r -d '' f; do
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f"
            done
          fi
          codesign --force --options runtime --timestamp --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize & staple
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          spctl --assess --type execute --verbose=2 "$APP"
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, notarize & staple the DMG
        id: package
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          DMG="Boopa-${{ steps.ver.outputs.version }}.dmg"
          chmod +x scripts/make-dmg.sh
          # On a headless runner the Finder layout is skipped; the DMG is still a
          # working drag-to-Applications image.
          scripts/make-dmg.sh "$APP" "$DMG"
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          rm -f "$RUNNER_TEMP/AuthKey.p8"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.package.outputs.dmg }}
          generate_release_notes: true

      - name: Bump Homebrew cask on main
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.package.outputs.sha256 }}"
          git fetch origin main
          git checkout -B main origin/main
          sed -i '' -E "s/version \"[^\"]*\"/version \"$VERSION\"/" Casks/boopa.rb
          sed -i '' -E "s/sha256 \"[^\"]*\"/sha256 \"$SHA\"/" Casks/boopa.rb
          if ! git diff --quiet Casks/boopa.rb; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Casks/boopa.rb
            git commit -m "cask: bump Boopa to $VERSION"
            git push origin main
          fi
