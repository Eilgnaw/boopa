name: Release DMG

# Signing uses a cloud-managed Developer ID cert, which can't run in CI — so you
# sign + notarize Boopa.app locally (Xcode → Distribute App → Direct Distribution).
# This workflow only takes that notarized .app, wraps it in a drag-to-Applications
# DMG, notarizes & staples the DMG with an App Store Connect API key, attaches it to
# the release, and bumps the Homebrew cask.
#
# How to release:
#   1. Notarize Boopa.app locally (Xcode Direct Distribution).
#   2. Zip it:   ditto -c -k --keepParent Boopa.app Boopa.app.zip
#   3. Create a GitHub Release on tag vX.Y.Z and upload Boopa.app.zip as an asset.
#      Publishing the release runs this workflow, which adds Boopa-X.Y.Z.dmg to it.
#   (Re-run manually via "Run workflow" with an existing tag if needed.)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   AC_API_KEY_ID          App Store Connect API key ID (e.g. FL96YHNTNR).
#   AC_API_ISSUER_ID       Issuer ID (UUID).
#   AC_API_KEY_P8_BASE64   The AuthKey_XXXX.p8, `base64 -i AuthKey.p8 | pbcopy`.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag that has Boopa.app.zip attached (e.g. v1.0.0)"
        required: true

permissions:
  contents: write # upload the DMG + commit the cask bump

jobs:
  dmg:
    runs-on: macos-15
    timeout-minutes: 30 # notarization is usually < 5 min; bail out if something hangs
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag / version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download the notarized app from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.ver.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" --pattern "Boopa.app.zip" --dir .
          ditto -x -k Boopa.app.zip .
          test -d Boopa.app

      - name: Verify the app is signed & notarized
        run: |
          spctl --assess --type execute --verbose=2 Boopa.app
          xcrun stapler validate Boopa.app

      - name: Build, notarize & staple the DMG
        id: package
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          DMG="Boopa-${{ steps.ver.outputs.version }}.dmg"
          chmod +x scripts/make-dmg.sh
          # Headless runner: the Finder layout is skipped, but the DMG is still a
          # working drag-to-Applications image.
          scripts/make-dmg.sh "$PWD/Boopa.app" "$DMG"
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          rm -f "$RUNNER_TEMP/AuthKey.p8"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Attach DMG to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            "${{ steps.package.outputs.dmg }}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Bump Homebrew cask on main
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.package.outputs.sha256 }}"
          git fetch origin main
          git checkout -B main origin/main
          sed -i '' -E "s/version \"[^\"]*\"/version \"$VERSION\"/" Casks/boopa.rb
          sed -i '' -E "s/sha256 \"[^\"]*\"/sha256 \"$SHA\"/" Casks/boopa.rb
          if ! git diff --quiet Casks/boopa.rb; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Casks/boopa.rb
            git commit -m "cask: bump Boopa to $VERSION"
            git push origin main
          fi
